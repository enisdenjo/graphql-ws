name: Release

on:
  push:
    branches:
      - master
  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  snapshot:
    if: github.event_name == 'pull_request'
    name: Snapshot
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    # head of v1 broke releases see https://github.com/enisdenjo/graphql-ws/pull/668
    uses: the-guild-org/shared-config/.github/workflows/release-snapshot.yml@14e013cbeb50250128606c04dee21235c09af7a2
    with:
      node-version-file: .node-version
      npmTag: ${{ github.event.pull_request.title == 'Upcoming Release Changes' && 'rc' || 'alpha' }}
      restoreDeletedChangesets: ${{ github.event.pull_request.title == 'Upcoming Release Changes' && true || false }}
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}
  stable:
    if: github.ref == 'refs/heads/master'
    name: Stable
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    # head of v1 broke releases see https://github.com/enisdenjo/graphql-ws/pull/668
    uses: the-guild-org/shared-config/.github/workflows/release-stable.yml@14e013cbeb50250128606c04dee21235c09af7a2
    with:
      node-version-file: .node-version
      releaseScript: changeset publish
      versionScript: changeset version
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}
